# OpenGantry 2.1.0 release mission: version parity, docs sync, npm publish (issue #74).
# Legislated intent: ship gapman 2.1.0 after v2.1 waves MSN-0047–0055 with race-safe publish gates.
msn_id: MSN-0056
skill_key: gapman
gate_command: ./scripts/dev-validate-core.sh
gate_success_substring: dev-validate-core OK
llm_verifiers:
  - id: stub
    command: ./scripts/kpi-stub-verifier.sh
    required: true
aggregators:
