# Validates OpenGantry substrate: Foreman MANIFEST + path-scoped [MSN-NNNN] on PRs.
#
# PR governance (pull_request only): mission PRs must target the repo default branch
# (override: repository variable GXT_INTEGRATION_BRANCH when integration branch differs).
# MSN policy (pull_request only): commits touching MSN-enforced paths must have
# subject [MSN-NNNN] (four digits), a valid gxt-bypass git note, or satisfy
# repository-declared trusted_automation policy (.gitagent/config.json).
# Mission purity: scripts/verify-pr-missions.sh — one [MSN-NNNN] per PR commit range.
# Paths = fixed substrate (.gitagent/, WORKER_LOG.md, .githooks/, gxt-validate.yml)
#       + all MANIFEST skills[].tmvc_roots (Node via scripts/gxt-manifest-lib.mjs).
# Logic: scripts/validate-gxt.sh — keep workflow header and script in sync.

name: GXT validate

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  pr_governance:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Enforce base branch isolation
        run: |
          base="${{ github.event.pull_request.base.ref }}"
          expected="${{ vars.GXT_INTEGRATION_BRANCH || github.event.repository.default_branch }}"
          if [ "$base" != "$expected" ]; then
            echo "::error::Governance Violation: Mission PR targets '$base' instead of '$expected'. Stacking missions violates blast-radius isolation. Re-target the PR to '$expected'."
            exit 1
          fi

  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Node deps
        run: npm ci

      - name: Build gantry
        run: npm run build

      - name: gantry check (MANIFEST + Rule 4.4 skills sync)
        run: node dist/cli/index.js check

      - name: Validate Foreman MANIFEST.json (Node parity)
        run: ./scripts/validate-gxt.sh manifest

      - name: gantry unit tests
        run: node --test dist/cli/tests/*.test.js

      - name: gantry doctor (readiness)
        run: node dist/cli/index.js doctor

      - name: gantry perimeter (CI signature enforcement)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: node dist/cli/index.js perimeter --ci --base-ref "$BASE_SHA"

  code_quality:
    if: github.event_name == 'pull_request'
    needs: pr_governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Node deps
        run: npm ci

      - name: Build gantry
        run: npm run build

      - name: Changed-code quality gates (complexity + import layers)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: ./scripts/check-changed-code.sh "$BASE_SHA" "$HEAD_SHA"

  npm_pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: npm pack check
        run: ./scripts/npm-pack-check.sh

  msn_commits:
    if: github.event_name == 'pull_request'
    needs: pr_governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch gxt-bypass git notes
        run: git fetch origin 'refs/notes/*:refs/notes/*' || true

      - name: Path-scoped MSN commit subjects
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: ./scripts/validate-gxt.sh msn "$BASE_SHA" "$HEAD_SHA"

  mission_verify:
    if: github.event_name == 'pull_request'
    needs: pr_governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: Build gantry
        run: npm run build

      - name: Full verify on PR-changed missions
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: ./scripts/verify-pr-missions.sh
